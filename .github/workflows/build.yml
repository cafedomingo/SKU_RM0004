name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Lint shell scripts
        run: shellcheck install.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run tests with coverage
        run: go test -coverpkg=./cmd/display/...,./internal/... -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1


  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build display binary (arm64)
        run: GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o display ./cmd/display

      - name: Build screenshot tool (native)
        run: go build -o screenshot ./cmd/screenshot

      - name: Generate screenshots
        run: ./screenshot

      - name: Check screenshots are up to date
        run: |
          if ! git diff --quiet docs/*.png; then
            echo "::error::Screenshots are out of date. Run 'go build -o screenshot ./cmd/screenshot && ./screenshot' and commit the updated PNGs."
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: display

  release:
    needs: [lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: install.sh
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v8
        with:
          name: build

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          chmod +x display install.sh
          TAG=$(date -u +%Y.%m.%d.%H%M)
          gh release create "$TAG" display install.sh \
            --title "$TAG" \
            --notes "Built from commit ${GITHUB_SHA::7}."
