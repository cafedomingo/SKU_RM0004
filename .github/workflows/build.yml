name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: make format-check

      - name: Lint shell scripts
        run: shellcheck install.sh

      - name: Install cross-compiler and dependencies
        run: sudo apt-get install -y gcc-aarch64-linux-gnu libi2c-dev

      - name: Build for aarch64
        run: CC=aarch64-linux-gnu-gcc make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: display
          path: display

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: install.sh
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          name: display

      - name: Create or update releases
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          chmod +x display install.sh

          LATEST_NOTES='Automatically built from main branch.

          ## Install or update

          ```
          curl -sL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | sudo bash
          ```'

          # Update rolling "latest" release
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest display install.sh --clobber
            gh release edit latest --notes "$LATEST_NOTES"
          else
            gh release create latest display install.sh --title "Latest Build" --notes "$LATEST_NOTES"
          fi

          # Create dated release (YYYY-MM-DD.N)
          TODAY=$(date -u +%Y-%m-%d)
          BUILD=1
          while gh release view "${TODAY}.${BUILD}" >/dev/null 2>&1; do
            BUILD=$((BUILD + 1))
          done
          TAG="${TODAY}.${BUILD}"

          DATED_NOTES="Built from commit ${GITHUB_SHA::7} on ${TODAY}.

          ## Install this version

          \`\`\`
          curl -sL https://github.com/${{ github.repository }}/releases/download/${TAG}/install.sh | sudo bash
          \`\`\`"

          gh release create "$TAG" display install.sh \
            --title "$TAG" \
            --notes "$DATED_NOTES"
