name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: make format-check

      - name: Lint shell scripts
        run: shellcheck install.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests
        run: make test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler and dependencies
        run: sudo apt-get install -y gcc-aarch64-linux-gnu libi2c-dev

      - name: Build for aarch64
        run: CC=aarch64-linux-gnu-gcc make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: display
          path: display

  release:
    needs: [lint, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: install.sh
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          name: display

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          chmod +x display install.sh

          TAG=$(date -u +%Y.%m.%d.%H%M)

          gh release create "$TAG" display install.sh \
            --title "$TAG" \
            --notes "Built from commit ${GITHUB_SHA::7}."
