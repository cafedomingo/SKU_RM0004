name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check C formatting
        run: make format-check

      - name: Lint shell scripts
        run: shellcheck install.sh

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Rust formatting
        run: make -C rust format-check

      - name: Run Clippy
        run: make -C rust clippy

  lint-zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Check Zig formatting
        run: make -C zig format-check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler and dependencies
        run: sudo apt-get install -y gcc-aarch64-linux-gnu libi2c-dev

      - name: Build for aarch64
        run: CC=aarch64-linux-gnu-gcc make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: display
          path: display

  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-linker
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build for aarch64
        run: cargo build --release --target aarch64-unknown-linux-gnu --manifest-path rust/Cargo.toml

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: display-rust
          path: rust/target/aarch64-unknown-linux-gnu/release/display

  build-zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Build for aarch64
        run: cd zig && zig build -Dtarget=aarch64-linux

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: display-zig
          path: zig/zig-out/bin/display

  release:
    needs: [lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: install.sh
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          name: display

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          chmod +x display install.sh

          TAG=$(date -u +%Y.%m.%d.%H%M)

          gh release create "$TAG" display install.sh \
            --title "$TAG" \
            --notes "Built from commit ${GITHUB_SHA::7}."
