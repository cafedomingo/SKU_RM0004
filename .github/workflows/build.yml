name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libi2c-dev

      - name: Build for aarch64
        run: CC=aarch64-linux-gnu-gcc make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: display
          path: display

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: update.sh
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          name: display

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          chmod +x display
          NOTES='Automatically built from main branch.

          ## Update existing installs

          ```
          curl -sL https://github.com/${{ github.repository }}/releases/latest/download/update.sh | sudo bash
          ```'
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest display update.sh --clobber
            gh release edit latest --notes "$NOTES"
          else
            gh release create latest display update.sh --title "Latest Build" --notes "$NOTES"
          fi
